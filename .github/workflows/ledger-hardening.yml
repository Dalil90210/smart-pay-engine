name: Ledger hardening

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ledger-hardening-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ledger-hardening:
    name: Constraints, unbalanced scan, concurrency, fuzz
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Direct Postgres access for the hardening suite. Set these as repo secrets
    # (Settings → Secrets and variables → Actions). SUPABASE_DB_URL is optional —
    # if provided, PG* vars are derived from it.
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      PGHOST: ${{ secrets.PGHOST }}
      PGPORT: ${{ secrets.PGPORT }}
      PGUSER: ${{ secrets.PGUSER }}
      PGPASSWORD: ${{ secrets.PGPASSWORD }}
      PGDATABASE: ${{ secrets.PGDATABASE }}
      PGSSLMODE: require
      # Run the fuzz many times with up to 200 ops each to catch rare
      # invariant breaks. Each iteration reseeds and re-asserts the 3
      # invariants (no unbalanced tx, no negative user cash, value conserved).
      LEDGER_FUZZ_ITERATIONS: "20"
      LEDGER_FUZZ_OPS_PER_ITER: "200"
      # Vary the seed per CI run so successive PRs explore different op sequences.
      LEDGER_FUZZ_SEED: ${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          missing=0
          for v in SUPABASE_URL SUPABASE_PUBLISHABLE_KEY PGHOST PGUSER PGPASSWORD PGDATABASE; do
            if [ -z "${!v}" ]; then
              echo "::warning::Missing required secret: $v"
              missing=1
            fi
          done
          if [ "$missing" = "1" ]; then
            echo "SKIP_LIVE_TESTS=true" >> "$GITHUB_ENV"
            echo "::notice::Live DB secrets not configured — skipping live ledger tests."
          fi

      - name: Install psql client
        if: env.SKIP_LIVE_TESTS != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Set up Python
        if: env.SKIP_LIVE_TESTS != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        if: env.SKIP_LIVE_TESTS != 'true'
        run: python -m pip install --no-cache-dir requests

      - name: Materialise .env for test scripts
        if: env.SKIP_LIVE_TESTS != 'true'
        run: |
          {
            echo "VITE_SUPABASE_URL=\"$SUPABASE_URL\""
            echo "VITE_SUPABASE_PUBLISHABLE_KEY=\"$SUPABASE_PUBLISHABLE_KEY\""
          } > .env

      - name: Confirm DB connectivity
        if: env.SKIP_LIVE_TESTS != 'true'
        run: psql -c "select 1 as ok" >/dev/null

      # Structural constraints (amount>0, direction enum, UNIQUE idempotency key,
      # RLS insert denial), balances-are-derived, RLS cross-user isolation,
      # and 200-op property-based fuzz asserting the 3 invariants.
      - name: Run ledger_hardening.py (constraints + RLS + fuzz)
        if: env.SKIP_LIVE_TESTS != 'true'
        run: python tests/ledger/ledger_hardening.py

      # Live unbalanced-transaction scan, idempotency, overdraft rejection,
      # and concurrent double-spend (exactly one wins, no negative balances).
      - name: Run ledger_invariants.sh (unbalanced scan + concurrency)
        if: env.SKIP_LIVE_TESTS != 'true'
        run: bash tests/ledger/ledger_invariants.sh

      # Focused audit-brief scenario: balance=100, two parallel 80-unit
      # transfers, plus duplicate-idempotency-key submission.
      - name: Run ledger_concurrency.py (lock + idempotency proof)
        if: env.SKIP_LIVE_TESTS != 'true'
        run: python tests/ledger/ledger_concurrency.py
